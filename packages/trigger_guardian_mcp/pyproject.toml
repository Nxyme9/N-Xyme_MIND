# trigger-guardian-mcp
# Trigger phrase monitoring and routing MCP server

[project]
name = "trigger-guardian-mcp"
version = "1.0.0"
description = "Trigger phrase monitoring and routing MCP server for N-Xyme_MIND"
requires-python = ">=3.11"
dependencies = [
    "fastmcp>=2.0.0",
]

[project.scripts]
trigger-guardian-mcp = "trigger_guardian_mcp.__main__:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["trigger_guardian_mcp*"]