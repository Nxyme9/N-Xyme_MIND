[project]
name = "n-xyme-local-llm"
version = "0.1.0"
description = "Local LLM integration: Ollama client, caching, RAG injection, tool validation"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "httpx>=0.24",
    "pydantic>=2.0",
    "intelligent-router-mcp",
    "n-xyme-infrastructure",
    "n-xyme-memory-core",
]

[tool.uv.sources]
intelligent-router-mcp = { workspace = true }
n-xyme-infrastructure = { workspace = true }
n-xyme-memory-core = { workspace = true }

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["local_llm", "local_llm.*"]
namespaces = true
