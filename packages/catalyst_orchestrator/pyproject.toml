# catalyst-mcp
# BMAD Workflow and Catalyst Orchestration MCP Server

[project]
name = "catalyst-mcp"
version = "1.0.0"
description = "BMAD workflow execution and Catalyst orchestration MCP server for N-Xyme_MIND"
requires-python = ">=3.11"
dependencies = [
    "fastmcp>=2.0.0",
]

[project.scripts]
catalyst-mcp = "catalyst_mcp.__main__:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["catalyst_mcp*"]
