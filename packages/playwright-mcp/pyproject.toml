[project]
name = "n-xyme-playwright-mcp"
version = "0.1.0"
description = "Playwright MCP server for browser automation"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "mcp>=1.0",
    "playwright>=1.40",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
]

[project.scripts]
playwright-mcp = "playwright_mcp:main"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["playwright_mcp*"]
