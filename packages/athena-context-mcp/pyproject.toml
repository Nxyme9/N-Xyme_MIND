# athena-context-mcp
# Context injection MCP server for N-Xyme_MIND

[project]
name = "athena-context-mcp"
version = "1.0.0"
description = "Context injection MCP server for Athena memory bank"
requires-python = ">=3.11"
dependencies = [
    "fastmcp>=2.0.0",
    "pyyaml>=6.0",
]

[project.scripts]
athena-context-mcp = "athena_context_mcp.__main__:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["athena_context_mcp*"]