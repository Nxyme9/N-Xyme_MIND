[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "n-xyme-nx-brain-mcp"
version = "1.0.0"
description = "Central brain MCP server that aggregates all N-Xyme MCP tools"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "MIT"}
authors = [
    {name = "N-Xyme Team", email = "nxyme@example.com"}
]

dependencies = [
    "fastmcp>=2.0.0",
]

[project.scripts]
brain-mcp = "brain_mcp:main"

[tool.setuptools]
packages = ["brain_mcp"]