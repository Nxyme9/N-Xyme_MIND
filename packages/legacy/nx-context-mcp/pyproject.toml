# nx-context-mcp
# Context injection MCP server for N-Xyme_MIND

[project]
name = "nx-context-mcp"
version = "1.0.0"
description = "Context injection MCP server for Athena memory bank"
requires-python = ">=3.11"
dependencies = [
    "fastmcp>=2.0.0",
    "pyyaml>=6.0",
]

[project.scripts]
nx-context-mcp = "nx_context_mcp.__main__:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["nx_context_mcp*"]