repos:
  - repo: local
    hooks:
      - id: rustfmt
        name: rustfmt
        entry: cargo fmt --all --check
        language: system
        types: [rust]
        pass_filenames: false
      - id: clippy
        name: clippy
        entry: cargo clippy --all -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-audit
        name: cargo-audit
        entry: cargo audit
        language: system
        types: [rust]
        pass_filenames: false
        stages: [push]
