name: Quality Gates

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Cache uv binary
        uses: actions/cache@v4
        with:
          path: ~/.local/bin
          key: uv-${{ runner.os }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-
      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-packages-${{ runner.os }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            uv-packages-${{ runner.os }}-
      - name: Run Gate 1 - Python Type Check
        run: bash bin/quality-gates/gate-1-py-typecheck.sh

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Cache uv binary
        uses: actions/cache@v4
        with:
          path: ~/.local/bin
          key: uv-${{ runner.os }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-
      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-packages-${{ runner.os }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            uv-packages-${{ runner.os }}-
      - name: Run Gate 2 - Python Lint
        run: bash bin/quality-gates/gate-2-py-lint.sh

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run Gate 3 - Format
        run: bash bin/quality-gates/gate-3-format.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run Gate 4 - Tests
        run: bash bin/quality-gates/gate-4-test.sh

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install dependencies
        run: |
          uv pip install pytest pytest-cov
      - name: Run coverage check (min 70%)
        run: |
          PYTHONPATH=. uv run pytest tests/ --cov=src --cov-fail-under=70 --cov-report=term-missing

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Gate 5 - Secret Scan
        run: bash bin/quality-gates/gate-5-secrets.sh

  placeholders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Gate 6 - Placeholder Scan
        run: bash bin/quality-gates/gate-6-placeholders.sh

  pyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install pyright
        run: uv tool install pyright
      - name: Run pyright type check
        run: uv run pyright src/ --outputjson

  dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install pip-audit
        run: uv tool install pip-audit
      - name: Run Gate 9 - Dependency Scan
        run: bash bin/quality-gates/gate-9-deps.sh

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install bandit
        run: uv tool install bandit
      - name: Run Gate 10 - SAST
        run: bash bin/quality-gates/gate-10-sast.sh

  coverage-trend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Run Gate 11 - Coverage Trend
        run: bash bin/quality-gates/gate-11-coverage-trend.sh || true
  summary:
    runs-on: ubuntu-latest
    needs: [typecheck, lint, format, test, coverage, secrets, placeholders, pyright, dependencies, sast, coverage-trend]
    steps:
      - name: Quality Gate Summary
        run: |
          echo "## Quality Gates Complete" >> $GITHUB_STEP_SUMMARY
          echo "All 11 quality gates passed successfully." >> $GITHUB_STEP_SUMMARY
