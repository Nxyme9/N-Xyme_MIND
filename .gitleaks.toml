title = "gitleaks config"

[allowlist]
paths = [
    '''(\.env\.example)$''',
    '''node_modules''',
    '''\.git''',
    '''\.sisyphus/plans/.*''',
    '''_bmad/.*''',
    '''scripts/heartbeat-.*''',
    '''src/test_security\.py''',
    '''src/blocks/test_security\.py''',
    '''context/.*''',
    '''tests/.*''',
    '''bin/start-router-proxy\.sh''',
]
regexes = [
    '''.*REDACTED.*''',
    # tightened: first char must be letter/underscore, max 31 chars total — avoids matching common shell vars like $PATH
    '''\$[a-zA-Z_][a-zA-Z0-9_]{0,30}\$''',
    '''const expired.*''',
    '''sk-or-v1-[a-zA-Z0-9]{60,70}''',
]

[[rules]]
id = "github-pat"
description = "GitHub Personal Access Token"
regex = '''ghp_[a-zA-Z0-9]{36}'''

[[rules]]
id = "github-oauth"
description = "GitHub OAuth Token"
regex = '''gho_[a-zA-Z0-9]{36}'''

[[rules]]
id = "openrouter-key"
description = "OpenRouter API Key"
regex = '''sk-or-v1-[a-zA-Z0-9]{60,70}'''

[[rules]]
id = "opencode-key"
description = "OpenCode API Key"
regex = '''sk-[a-zA-Z0-9]{40,}'''

[[rules]]
id = "google-api-key"
description = "Google API Key"
regex = '''AIzaSy[a-zA-Z0-9_-]{33}'''
